body:
  text: 左史諫草詔令奏議類二奏議之屬提要臣等謹案左史諫草一卷宋吕午撰午字伯可歙縣人嘉定四年官至進士起居郎右文殿修撰知漳州事蹟具宋史本𫝊是編凡奏議六首後附其子沆奏議一首後又附載家𫝊詩文之類最後載吕氏節女事皆因家𫝊附編者也午兩為諫官以風節自勵知無不言理宗嘗稱其議論甚明切又謂其論邊事甚好此六疏皆理宗嘉熙二年所上雖篇數無多而宋末時事頗可考見其論宋宰相臺諫之弊尤極詳懇其子沆一疏并方回所為午及沆傳亦多與宋史本傳可以相證回稱午文集名竹坡類藁是午本有全集而今佚之茲六疏蓋存於散佚之餘者其他遺文則頗散見於新安文獻志諸書云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:62c1f05eaa2fdaca4a4cc99174eb10e99a050135b0eb29f6d86fcce3ac9c49ac
