body:
  text: 監簿呂公家傳公姓呂諱沆字叔朝左史右撰知郡開國先生子也開禧元年乙丑十二月九日生後左史一日紹定六年癸巳明堂恩補將仕郎端平三年丙申銓試第一人授迪功郎台州黃岩縣主簿嘉熙元年丁酉十月左史除監察御史依條改監西京中京中嶽廟次任總領湖廣江西西京財賦所準備差遣所總領者賈似道也似道貴妃弟年少狎遊不肖於錢塘門西葛嶺聚博挾妓罔所不為理廟知之怒丞相喬行簡亦怒除似道太府寺丞欲與易右班而丁酉似道請行漕舉戊戍假手登科常丞權郎軍少升監駸駸顯要行簡拜平章終不能行似道換右之議以似道懇禱孫德之為地也或謂理廟欲臺諫論似道而似道深交公於西馬城之寓宇偽為敬憚冀裏言免臺評者於是似道庚子嵗虛除廣西憲倉不赴改江淮都大坑冶公事年二十八乃丞相史嵩之隂媚貴妃交結固位之所為淳祐六年辛丑四月似道除太府少卿湖廣總領年二十九而天下之敗根於嵩之之此除公長似道八嵗在幕已即有隙似道有湖上所愛女冠囑公為致之鄂渚公婢有道士裝者似道疑公自取大怒將殺公徐知不然而左史再除監察御史公再任中嶽乃已左史甲辰出臺立螭以憂歸里遂不復仕公之再任中嶽也丁母祝氏夫人憂尋改知臨安府於潛縣壬子父子同間居九年矣乃迎左史之於潛淮西總領趙與陋辟充本所主管文字乙卯十二月左史薨於金陵護喪由城西歸葬岩鎮董丞相槐公師也程丞相元鳳里人也二公相公皆居憂服闋戊午請兩浙漕解似道入相通判婺州權郡護浙東提刑司印特差充提領兩浙轉運鹽事使司主管文字又特差充行在點檢贍軍激賞酒庫所主管文字護浙西安撫司印登朝歷四轄六院之文思癸亥行公田初欲行之東南諸路謂可免和糴魏臨安克愚當奉行隂疏七不可遭重劾乃僅行之浙西六郡甲子七月彗星出公稟似道札乞罷公田還元主咸淳四年戊辰九月輪對又言易新佃改莊官不便不若責付元賣田主嵗自抱租運納會子起於孝廟用四川紙印造一貫準銅錢七百七十足會價終不及此數端平初十五界十六界並行鄭清之相驟廢十五界新行十七界以凖六界之二而物價騰湧會價新者與舊價俱落至欲履畝收楮為之大罪嵩之廢十六界行十八界以準十七界之伍而十七界僅直銅錢五十文十八界直二百五十文庚子至甲子閲嵗二十五民頗安之理廟微時行第十七福王與芮第十八上意不欲廢此二楮者此也似道故作銅錢關子以一準十八界之三理廟難之似道於升遐之日偽作遺詔廢十七界行關子舊此許以舊楮易官新楮假如十七界直五十文官當收舊界新十七界十五貫換與關子一貫可也而似道直廢十七界更不換與新關自四川破十八界會子及關子用徽州紙易破爛聚於行部每貫民間有貼會錢官司受納必欲好新楮似道置局令百姓出用錢換新好關子當時十七界曰瓶楮十八界曰芝楮取繪物名關子目曰關楮民戲言過此一關不得公謂關子雖軟爛官司受納通用則流行矣置局許百姓換新好者則是賤軟腐之楮民烏得不疑似道以彗星出時以罷公田卜理廟意非誠也公諫似道尚未見罪至此並言公田關子似道大怒公急入札丐去則偽除將作監簿急令言者論寢久之與華州雲臺觀祠起知興國軍未赴論仍雲臺祠起知全州未赴論與建昌軍仙都祠似道所以待士大夫皆若此德祐元年乙亥三學上書伏闕訟公屈召赴行在公不復出似道殛死而國亦隕矣公師參政清叟董丞相槐皆尚朱文公之學理廟致毋不敬座右銘用止字韻朝臣賡詠清叟思止字欲用經語公曰拜手揚言緝熙敬止可不可乎清叟喜用以繳進稱旨赴總幕過長沙槐為師問性與天道章公以文公語答槐大喜即送薦剡謂旅中不必謝啓可徐附來公翼旦袖啓謝座客五十餘人槐讀舉警句稱之又益大喜在總幕漕使陳登得公古詩一即兼畀大小二狀嶽鄂王飛金千兩朝廷以鎮庫前政以金質制司米餉軍米歸制司而金不歸總所前後紛競公細閲舊牘書擬制司孟珙見之謂敷析明白歸金而竒公再為中嶽過吳門吳丞相潛時為守與行部監司交惡槧囑公侍旁一言願兩劾罷槧居餽百金公答為人子未嘗預外事謹不出使者峻却之以清介知名自此始得地杏城葬母祝氏夫人旁近古墓之後人願改去公謂汝墓在先吾母葬在後骨肉一同何忍如此悉築墻圍之共為一區在於潛重囚逸見榜感公未嘗訊杖自歸獄責寓姻家售私酤擊官坊下尉司捕至論如法在婺封鐵鎖置獄公被踈決縱之斷朱君章四十二年不決田訟在行部息吳王兩府二十九年不決訟嵗飢招糴鄉民負斗米歸局官誣為私相糴糶遽欲斷配私居公爭不可叱吏汪允恭以為仇餉乃解似道捨相府以平章淫宴湖山公謂此國體攸關凡三移書規之似道憤不止公田關子疏也至元十三年丙子以後逍遙杏城岩鎮間十年南北大夫交敬義理典故詞章翰墨如先左史學問體朱文公而歐蘇後進師焉二十二年乙酉十二月五日卒年八十一是年秋微泄瀉日膳如常冬加脅疾卒之朝坐榻閲書謂生旦在近諸子喜治具將為壽甲夜呼諸子語平生清苦及家事後事備悉而逝官至朝議大夫賜紫金魚袋內子宜人孫氏戴氏子五人長將仕郎早卒未卒時所聘松木坊汪氏女先喪汪氏撥稅産三十貫近田三百畝徽州自陶雅田地山園以畝起錢然後以錢起稅物為呂將仕户議續好公謂未畢姻謝還之次本前修職郎浙漕貢士亦先以卒次樞機標皆前將仕郎貧為州縣學官女五人壻戴孔孫前登仕郎吳應紫前太學守約齋生謝楠前宣慰司劄差永豐倉大使章明祐從仕郎休寧縣尹方師聖皆進士孫男女曾孫男女不勝書卒後二年丁亥葬母祝氏夫人墓西汪樞密勃之內乃祝氏夫人之祖姑汪公義端義榮義和之母及朱文公之母皆祝氏之姑世謂祝氏世生貴女以公貴纍贈至碩人如夙占又升淑人論曰士大夫出處之際豈非天哉先左史公兩入察並出宰相進擬甲辰八月以憂去國九月嵩之敗繼相者不察間公一紀公亦坐視間九年而後出宰百里乙卯丙辰丁已丞相槐師也丞相元鳳同行輩也而公居憂不得二相絲毫之力大全敗似道入公乃似道老舊交遊京局轄院寸進坐言公田關子反斥其以元臺宴治湖山陽與隂奪雖一郡不得試間十四年鼎命惟新又間居十年公可謂屈矣然壽八十一大節可垂無窮則天之所憂公者於此亦未嘗不伸也歟贊曰彗星之變公言公田還以豫民福豈不綿官漁吏蠧更張廟田公謂不可以此獲譴瓶楮芝楮並行於時忽廢瓶楮一貫三芝新之未幾自厭其腐公謂不可以此取妒未有宰相出宅郊關柄臣傲主冶遊湖山左右妓肘豈調鼎手公謂不可以此獲咎父歸言路唆却私書父既歸隱同其間居郎止於權郡迄不試有大於此家學是繼方回撰監簿家傳
