body:
  text: 左史呂公家傳公諱午字伯可徽州歙縣人也曽祖升祖玗父大用贈中散大夫世居岩鎮公生於淳熙六年已亥十二月八日年十五入郡學同回先君琢師事教授四明舒先生璘先是郡解試不取書經先君告之禮部符下江東路轉運司取誥詩經一人自慶元元年乙卯始先君長公六嵗是年首預薦書後混補入太學升上舍而公以詩經薦於鄉嘉定三年庚子也明年辛丑省試公觀試院坐圖則詩經巨擘如邵康輩者皆左右以問先君先君謂太學時文印本出於衆手改定初本不然公始眇視同試者遂擢第趙建大榜第四甲年三十三而先君嘉定七年甲戍袁甫榜第四甲年四十一相與如親昆仲先君有弟四人奉親可逺宦初授四川蓬州教授後入西廣被謫以沒公奉二親不逺宦初授湖州烏程縣主簿次太平州當塗縣丞次監溫州天富北監鹽場改官知臨安府餘杭縣回生之年寶慶三年丁亥九月罷言路彈知縣十人藁九人矣而缺其一知公政聲賦役治獄訟平無可訾而以小宿憾取充十人之數疏出公論騰沸大不平以此愈名重一時其在烏程三太守皆致之幕郡事一決於公政出於學知名此始張魏公子定叟尚書之子忠恕在郡名士也特薦公尤力忠恕母夫人就養而公具慶忠恕躬至簿廳迎公二親入郡治二千石與一主簿綵衣侍飲時人榮之倪尚書思里居器公逺到時肩輿來語書滿郡人爭闢館宇延留公輕舟赴部授丞缺在當塗見知郡守吳柔勝其二子淵待次揚子縣主簿執政潛始魁多士後為相柔勝謂公有操守俾二子定交焉且檄入幕理曹攝蕪湖縣者頗爽淮西廬州遣兩兵追會公事理曹申郡以廬兵奪縣民為言柔勝怒悉置獄委公入勘公謂廬州已有公文則不可謂之奪民柔勝愈怒委公審勘公審訖稟柔勝先令左右問若何公執前説柔勝愈益怒謂廬兵奪我百姓豈可不黥不出迎公公坐客位不退不食柔勝聞勉出怒不息欲配二兵公徐曰若廬州初無公文則可配既有公文縣不為處置而反罪廬兵恐不可也久之乃從公請坐廬兵以騷擾押回本州自懲之此柔勝所以稱公有操守也陳貴誼來代淮西流民南渡自采石彌路滿城委公安集且類編開禧舊牘防江却敵知和州徐僑遷江東提舉與貴誼會聞知公在郡驚喜屈入幕先是癸酉秋僑以嚴州節推同公校支溫州服公精明也公以郡事未辦欲盡決遣而去帖催至十八而不以白貴誼僑專書貽貴誼公始行僑行部以田事忤丞相史彌逺論公還當北監鹽場之任浙東提舉張良朋留之幕旋兼沿海制置司事時海寇未平問䇿安出公廉知調軍出海糧盡即還軍獲寇物官盡拘收此所以寇卒未平與制幹施一飛議糧盡再給不許盡還賊舟所有悉以給軍於海道一清餘杭言者之誣朝廷察知紹定二年已丑差公為省試彌封官即差知常德府龍陽縣公舊無家長女壻忠靖即棨卜為營屋於杭北關門外之西馬城始寓居焉龍陽之政區分差役民願爭先為之豪富民陶守忠殺人正其獄誅之或謂近北作縣不滿補考正可差僉判公謂何不可者時彌逺雖非賢相猶置人才簿書賢士大夫以待用書公縣政於簿差公兩浙轉運司主管文字彌逺病久不見客公謁謝特出迎運使罷故不除人以公護印半年或白彌逺何不除浙漕曰怕護印官做不得公懼白左右司乞以臨安守兼始除衛差公監三省樞密院門兼監提轄封樁上庫丁父憂當紹定四年辛卯杭大火彌逺委公監造太廟凡二人其一貴遊子多不入局每飯羅列珍饌邏者視公朝夕未嘗離局疏食甚菲又書之才簿然終不能遽拔公於清要待遇如尋常人彌逺紹定六年癸已死端平元年甲午鄭清之相名為更化實未嘗更三京之師大敗公時居憂嘉熙元年丁酉六月除太府簿十月除監察御史清之罷矣左相喬行簡也右相崔與之不至理廟知公縣績特有此除在臺十有五月三年已亥正月除宗正少卿兼國史編修官實録院檢討官二月差知泉州當此時廟堂除授多私親故朋黨盤據贓貪狼籍公極言之州縣增價折納二稅倍收酒課商稅奏訖拘以充國用徽素不産銀米絹外官賦純用會子户部忽將嘉熙元年分茶租折帛錢改作銀會中半銀價時值十七界會子十五貫户部估作三貫郡守倪祖常窘甚公奏新安山多土瘠賦稅之輸一錢科十向或增一文二文州人以困三數年來增至五文二十文又增至三十文矣民户以三十文納一文之稅以價五倍納一兩之銀追納既急銀價愈增臣伏望下省部免銀仍舊用會旨依行簡初僅判免一分一釐賴公奏全免計銀三萬三千三百四十三兩郡人羅端州為記最大患者清之喪師排敵四蜀麋爛至是丁黼死於成都史嵩之孟珙在京湖嵩之尋升督府陳鞾杜杲在淮西處處危急王鑑黃州計兵十七萬人圍始解獨周葵在淮東不多兵而坐視淮西之困不肯出兵應援文具行簡書判都曹啓擬非不嚴切迫遂而葵終於遷延公數入文字奏不已葵造謗以公為黨於京湖之制司公坐是出臺遂與郡然公奏疏謂邊閫角立無同舟遇風之心不客幸災樂禍所合協心釋嫌嵩之亦憾公時行簡拜少傅平章李宗勉左相建督宗勉先在政府深以葵攻公之言為疑後自淮東見宗勉者乃言臺官皆有書與葵獨呂御史無之宗勉始大以公為賢昌言於人謂呂伯可元來特立無黨而葵與嵩之胥怨公待郡缺三年淳祐二年壬寅正月迓皆至公以泉南貨寶之地託以奉親不便辭時則嵩之以嘉定庚子四月自督府入與宗勉並相輪日當筆已滿二年行簡掌印總大綱其年九月行簡以少師保寧節去閏十二月宗勉卒於位嵩之獨相大權旁落彗出營室天下大旱西湖涸見底人相食江湖欲吞藥市艮門山又客星見於尾而世事大壞矣嵩之雖得彌逺人才簿心知敬公而內怨臺中所論閫事實忌憚公四月改除浙東提刑數日嵩之令鄧泳嗾董復亨論罷中外不直嵩之葵賜出身亦在樞府五月差提舉建康府崇禧觀理作自陳九月再除浙東提刑在任半年監察御史劉與中書葉舍人鬨俱出理廟臨朝諭嵩之臺諫不識事體只好尋一舊人言公姓名嵩之恨不出己意退擬兩人進一人其私也御筆特批除公於是三年癸卯四月公再入為監察御史至閫特旨內引謂卿向來議論甚明切又謂論邊陲事甚好者三續論嵩之除兼崇政殿説書嵩之雅不欲公入經筵隂肆沮抑時項容孫上疏回避公行殿中御史同在言路容孫娶上涇吕氏女於公從姪嵩之俾容孫公欲撼公去而於法無避嵩之乃與言路密謀以為王瓚者不樂公好喊閙除瓚為右正言十月五日也公嘗彈瓚之姻家史洽嵩之欲激令瓚與父交攻公即日出靈芝寺回避理廟親灑宸翰呂某求去朕已降旨不允可令都司諭旨仍於宸翰已字旁添一先字以示意嵩之見上眷如此不得已方委都司官校正韓祥都承陳一薦二人挽公入關嵩之又自作簡調停公謂臺諫既出無再入之理與二人相持一晝夜二人謂既出再入有例宜自奉君命還臺再入文字求去上終不允言路同官乃請約王德成先詣公廳謁見德成瓚字也杭人為嵩之客尤凶悍由是再留而議論愈不合一日省劄臺諫不許受短卷同官皆備榜客位公獨奏爭短卷固不可盡信若不受短卷即是塗臺諫耳目非天子所以寄耳目於臺諫之意既出人皆謂然嵩之鋭意行經界州縣一付吏手與豪民相表裏暗增下户稅額公以此劾去烏程縣令諸葛千里嵩之怒詈都司翰履善謂公曰祥等亦知之欲其且止然才稟輒怒今得察院言事姑寢矣嵩之自督入相蜀襄淮隳城喪師死於戰者數十百萬小捷則於上前張皇誇大挾以要君謂邊事非我莫能當也至謂諜報北境內亂欲自以為功從壽春漸謀進取公謂敗績狼狽之餘豈可復蹈前轍然尚不欲明言疏但謂我之間探並未嘗得其實不宜輕信妄動嵩之從弟賓之知徽州貪虐妄作公不避鄉嫌劾之嵩之最惡言邊事四年甲辰五月除起居郎出臺兼史院官公屢求去八月丁母潘夫人之憂九月四日嵩之丁父彌忠憂歸四明謀起服徐霖馮棻等及太學生羣起攻之嵩之敗議者不知公之兩為御史俱出理廟親擢初實不識嵩之非其客忤嵩之非繼是當國者乃例以為嵩之所用不再起公時年六十六矣一間十二年官階祠祿與奪一不屑意歸去故里回年二十二至岩鎮見父執八年戊申也往來公門下四年憐其孤苦啓迪誨諄至十一年辛亥以回歸自嶺南鄰封字之曰萬里為序為書送之遊江湖明年壬子公子沆知於潛縣及改辟淮西餉館皆近侍以行回東西奔走不及再見而公薨於金陵寶祐三年乙卯十二月九日公生之次日也年七十七回嘗謂人才消長世運之消長係焉近世乃人才日長世運日消則何故前三代夏商周也後三代漢唐宋也文章之盛宋不愧漢唐問學之盛則過之熙豐邪黨以元祐學為禁程氏之學與蘇黃為禁遂失中原學禁一弛光堯以是中興迤及乾淳蘇黃詩文學者所尚獨朱文公續伊洛之學未有能深好之者慶元黨論復起又以為禁孽韓殛死嘉定以來不及見文公而能續其脈者真魏兩公亦其人也公娶夫人祝氏先公十年沒實文公母夫人之從姪女得其家傳發明文公之學義根理據詞坦意明細潤精純紆餘條暢講座敷陳人人悅服稍得緒餘為名進士崖鐫冡鑱神惋鬼愕建安刋行類卷行世可考竹坡者公所至種竹以名其燕居也公之文有類蘇者字亦如蘇有全類考亭者視葉適之文刻而不典異矣詩不多作雖不專祖江西與四虛劉克莊之詩卑而陋霄壤矣元祐人才非不盛而符觀宣靖世運衰以章蔡消之也慶元嘉定淳祐亦尚有人才而世運愈衰不可藥如文公如真魏如公以托逺清嵩消之也大抵宋之人才非不長而宋之權臣消之消人才所以消世運至於賈似道則運無可消而有所歸矣自公之廢以庸繆汙鈞軸如謝方叔丁大全者比比公平生所敬獨徐參政清叟董丞相槐令子師尊之程丞相元鳳同里同經後公二十一年生相友善公身後除右文殿修撰知漳州四年丙辰春旨守本官職致仕以生存出命董程在政府為之也官至中奉大夫歙縣開國男食邑三百户後贈通奉大夫是年正月喪至馬城九月歸葬岩鎮子一人沆長女所適巴書次女適迪功劉泳孫五人見沆傳文集未刋行藏於家公夫人之家祝二居士景先者生男女十四人樞密汪公敕之內曰大五姑是生作礪子行第一從也作礪之內曰五十五姑是生義端義榮義和吏部朱文公松之內曰五姑是生文公皆孫行第二從也公之夫人曰三娘曽孫行第三從也祝穆和甫文公表弟之子撰方輿覽勝公為之序穆子洙監文思院以公為師合更竭論曰宋之天下以臺諫興亦以臺諫敗宰相不肖以臺諫去之易也不然則如蘇軾所云以干戈取之而不足矣然則臺諫與宰相交通可乎臺諫奉丞相之意自王安石行新法如章蔡紹定述而臺諫遂與宰相交通然猶有陳瓘劉安世百挫不屈中原喪矣東南一隅秦檜韓托胄史彌逺史嵩之皆隂與臺諫為一以去其所惡而擅權固位者也獨吾鄉左史公兩為御史出於理廟親擢前與喬行簡不合後與李宗勉嵩之亦不合時理廟端平清政之後懲創彌逺之專用臺諌自榮王與芮通行賄賂間有節貼宣諭庇存姻戚深防宰相之合然乃德彌逺立已之恩以邊事相其猶子嵩之大姦雖臺諫多其私人猶未敢全欺理廟所以左史公尚能少行其志議者不察過矣公乙卯云亡董丞相槐程丞相元鳳並無交通臺諫之迹而大閹董宋臣用事臺諫皆出其門自鄭清之再相則與周坦陳求魯陳垓蔡榮相表裏以媚宋臣以罔理廟吳丞相潛初以忤宋臣逐謝丞相方叔以子修與宋臣爭湖山冶遊去實則泉州人洪天錫外師呂中而外客於宋臣中在史館屢與天錫言事歎息無由得對可一吐所藴如宋臣謝堂厲文公近習戚里之橫莫敢言者中不知天錫實鑽刺宋臣得班六院忽一日天錫除監察御史宋臣力也請於中當言何事當劾何人偽也中歷教之天錫之進又隂與謝修深交以干方叔遂謂且借宋臣徑入言路叛而劾之可以得名黨謝修扶方叔入臺第一疏劾宋臣等理廟駭愕不行一再疏宣諭不行天錫去以此天下敬之而狡險矯詐世不悉也天錫晚節似道貴之至從列尚書終畏其人與閩帥宋臣憤天錫修至痛治方叔者其本末如此董程二相無如宋臣何宋臣至拔丁大全為臺諫論逐槐以行都弓兵火下舁槐出關若下大理恐知者元鳳相大全參預用吳衍翁應弼論竄太宗武學諸生皆宋大臣所為大全敗潛再相極力黜宋臣且有行瓘之忠而賈似道入密主宋臣殺潛理廟升遐由是咸淳臺諫一聽命於似道者十年彈劾全疏出於似道付下而貼黃行否任似道去取德祐丞相陳宜忠五月五日除回監察御史檢正字十朋押省劄下矣宜中令潘希仁來言月路仕者必由丞相分付回力辭不願為此官則又再遣希仁來言令回與謝堂往來太皇謝太后商量回再四辭謂似道身自為臺諫以至今日之敗丞相豈可復蹈覆轍省劄若至於辭免奏即擊平章王爚於是宜中收起新命次日門謝時服百官訝回猶立班宜中招飲託言爚收起省劄爚後擬俞浙監察御史宜中添擬回左司諫爚再並收起回上第二書言日食右相留夢炎偉之宜中謂回書首論爚不當為平章宜中正欲鼎立遂出回為郡宋之奉命豈非前後臺諫與宰相一之罪乎故因公家傳而極論之贊曰昔之科目士患不中亦既中之又患不用何以用之俾臨其民名曰親民始足發身獄訟賦役改秩作邑事罔不試乃臻朝績兩豸其冠兩繡其衣公出再入耽耽其威爰立三相行簡之耄宗勉之夭嵩之之盜三皆不合誰知有君左螭一出終身耕雲丁賈敗國熬我臺諫惟公之時尚無此患周程學問歐曽詞章高山仰止千古紫陽門生方回撰左史家傳
